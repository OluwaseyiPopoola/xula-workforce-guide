<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Xavier University of Louisiana Workforce" />
    <meta name="description" content="A guide for XULA student employees" />
    <title>The XULA Workforce Guide</title>

    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>

  <body>
    <header>
      <nav class="navbar">
        <a href="/pages/index.html" class="logo">
          <img
            src="/assets/img/xavier-logo-100-x-100.png"
            alt="XULA Logo"
            width="50"
          />
          <span class="logo-text">X Workforce</span>
        </a>

        <button on-click="sidebar-active">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            height="24px"
            viewBox="0 -960 960 960"
            width="24px"
            fill="#e3e3e3"
          >
            <path
              d="M120-240v-80h720v80H120Zm0-200v-80h720v80H120Zm0-200v-80h720v80H120Z"
            />
          </svg>
        </button>

        <ul class="navigation-links">
          <button on-click="sidebar-active">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              height="24px"
              viewBox="0 -960 960 960"
              width="24px"
              fill="#e3e3e3"
            >
              <path
                d="m256-200-56-56 224-224-224-224 56-56 224 224 224-224 56 56-224 224 224 224-56 56-224-224-224 224Z"
              />
            </svg>
          </button>
          <li><a href="/pages/index.html" class="active">Home</a></li>
          <li><a href="/pages/tcp.html">TCP Training Hub</a></li>
          <li><a href="/pages/forms.html">Forms</a></li>
          <li><a href="/pages/payroll.html">Payroll</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section id="introduction">
        <h1>Welcome to Xavier University's workforce!</h1>
        <p>
          This guide is designed to help you navigate your student employment
          experience at XULA with ease.
        </p>
        <div class="typing-text-container">
          <span class="text"></span>
        </div>

        <script>
          const text = document.querySelector(".text");

          const textLoad = () => {
            setTimeout(() => {
              text.textContent = "Learn how to use TCP for timekeeping";
            }, 0);

            setTimeout(() => {
              text.textContent =
                "Complete required student hiring forms (e.g, W-4, I-9, etc.)";
            }, 15000);

            setTimeout(() => {
              text.textContent =
                "Check out the payroll process for the next pay date, and more.";
            }, 30000);
          };

          textLoad();
          setInterval(textLoad, 45000);
        </script>

        <a href="/pages/tcp.html" class="btn-link">Get Started With TCP</a>
      </section>
    </main>
  </body>
</html>
